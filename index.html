<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福利定制供应商评价工具</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #1F3864; --med-blue: #2E75B6; --light-bg: #D9E2F3;
    --body: #333333; --red: #C00000; --green: #0D723E; --gold: #BF8F00;
    --white: #FFFFFF; --bg: #F5F7FA; --card: #FFFFFF; --border: #E0E4EA; --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--body); line-height:1.6; padding:20px; min-height:100vh; }
  .container { max-width:960px; margin:0 auto; }

  .header { text-align:center; padding:28px 20px 20px; background:linear-gradient(135deg,var(--navy),#2a5090); color:var(--white); border-radius:var(--radius); margin-bottom:20px; }
  .header h1 { font-size:22px; font-weight:700; margin-bottom:6px; }
  .header p { font-size:13px; opacity:0.8; }

  .btn { padding:8px 20px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:opacity 0.15s; white-space:nowrap; }
  .btn:hover { opacity:0.85; }
  .btn-primary { background:var(--navy); color:var(--white); }
  .btn-success { background:var(--green); color:var(--white); }
  .btn-danger { background:var(--red); color:var(--white); padding:5px 12px; font-size:12px; }
  .btn-outline { background:var(--white); color:var(--navy); border:1.5px solid var(--border); }
  .btn-export { background:var(--med-blue); color:var(--white); }
  .btn-sm { padding:5px 14px; font-size:12px; }

  .supplier-section {
    background:var(--card); border-radius:var(--radius); padding:20px 24px;
    margin-bottom:20px; border:1px solid var(--border);
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  .supplier-section label { font-size:14px; font-weight:600; color:var(--navy); }
  .supplier-section input[type="text"] { padding:8px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; width:200px; outline:none; }
  .supplier-section input[type="text"]:focus { border-color:var(--med-blue); }

  .dim-card { background:var(--card); border-radius:var(--radius); margin-bottom:16px; border:1px solid var(--border); overflow:hidden; }
  .dim-card.anchor-fail { border-color:var(--red); border-width:2px; }
  .dim-header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; cursor:pointer; user-select:none; }
  .dim-header:hover { background:#f8f9fb; }
  .dim-header .dim-title { display:flex; align-items:center; gap:12px; }
  .dim-header .dim-num { width:30px; height:30px; border-radius:8px; background:var(--navy); color:var(--white); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
  .dim-header .dim-name { font-size:14px; font-weight:600; color:var(--navy); }
  .dim-header .dim-weight { font-size:11px; color:var(--med-blue); background:var(--light-bg); padding:2px 8px; border-radius:20px; font-weight:600; }
  .dim-header .dim-result { display:flex; align-items:center; gap:8px; }
  .dim-header .dim-grade { font-size:11px; padding:2px 10px; border-radius:20px; font-weight:600; display:none; }
  .dim-header .dim-score-display { font-size:18px; font-weight:700; color:var(--navy); min-width:40px; text-align:right; }
  .dim-body { padding:0 24px 16px; display:none; }
  .dim-card.open .dim-body { display:block; }
  .dim-card.open .dim-header { border-bottom:1px solid var(--border); }

  .scoring-guide { font-size:11px; color:#5f6368; background:#F8F9FA; border-left:3px solid #1A365D; padding:8px 12px; border-radius:0 6px 6px 0; margin-bottom:12px; line-height:1.6; }
  .scoring-aux { margin-bottom:8px; }
  .scoring-aux strong { color:var(--navy); }
  .aux-item { display:inline-block; margin-right:8px; }
  .scoring-grade-row { display:flex; gap:8px; padding:3px 0; align-items:baseline; }
  .sg-label { font-weight:700; white-space:nowrap; flex-shrink:0; font-size:10px; padding:1px 6px; border-radius:3px; color:#fff; }
  .sg-label.g-excellent { background:#43A047; }
  .sg-label.g-good { background:#1E88E5; }
  .sg-label.g-ok { background:#F9A825; color:#333; }
  .sg-label.g-pass { background:#E65100; }
  .sg-label.g-fail { background:#C62828; }
  .sg-desc { font-size:11px; color:#444; }
  .anchor-box { background:#FFF8E1; border:1px solid #FFE082; border-radius:8px; padding:12px 14px; margin-bottom:14px; }
  .anchor-box.fail { background:#FFEBEE; border-color:#EF9A9A; }
  .anchor-title { font-size:12px; font-weight:700; color:var(--navy); margin-bottom:4px; }
  .anchor-desc { font-size:11px; color:#666; margin-bottom:8px; line-height:1.5; }
  .anchor-toggle { display:flex; gap:8px; }
  .anchor-btn { padding:5px 16px; border:2px solid var(--border); border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; background:var(--white); color:var(--body); }
  .anchor-btn.pass { background:var(--green); color:var(--white); border-color:var(--green); }
  .anchor-btn.fail-btn { background:var(--red); color:var(--white); border-color:var(--red); }

  .score-row { display:flex; align-items:center; gap:12px; }
  .score-row label { font-size:12px; font-weight:600; color:var(--navy); white-space:nowrap; }
  .score-slider-wrap { flex:1; }
  .score-slider { -webkit-appearance:none; width:100%; height:6px; border-radius:3px; background:linear-gradient(to right,var(--red) 0%,var(--gold) 40%,var(--green) 80%); outline:none; cursor:pointer; }
  .score-slider::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--white); border:3px solid var(--med-blue); box-shadow:0 2px 6px rgba(0,0,0,0.15); cursor:pointer; }
  .score-slider:disabled { opacity:0.4; cursor:not-allowed; }
  .score-number { width:56px; padding:6px 8px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-weight:700; text-align:center; color:var(--navy); outline:none; }
  .score-number:disabled { opacity:0.4; background:#f5f5f5; }
  .score-max { font-size:12px; color:#999; }

  .grade-ref { margin-top:12px; display:grid; grid-template-columns:repeat(5,1fr); gap:4px; }
  .grade-ref-item { text-align:center; padding:4px 2px; border-radius:6px; font-size:10px; line-height:1.3; transition:all 0.15s; }
  .grade-ref-item.active { transform:scale(1.05); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .grade-ref-item .g-name { font-weight:700; }
  .grade-ref-item .g-range { color:#666; }
  .g-excellent { background:#E8F5E9; } .g-excellent .g-name { color:var(--green); } .g-excellent.active { background:#C8E6C9; }
  .g-good { background:#E3F2FD; } .g-good .g-name { color:var(--med-blue); } .g-good.active { background:#BBDEFB; }
  .g-ok { background:#FFF8E1; } .g-ok .g-name { color:var(--gold); } .g-ok.active { background:#FFECB3; }
  .g-pass { background:#FFF3E0; } .g-pass .g-name { color:#E65100; } .g-pass.active { background:#FFE0B2; }
  .g-fail { background:#FFEBEE; } .g-fail .g-name { color:var(--red); } .g-fail.active { background:#FFCDD2; }

  .deduct-card { background:var(--card); border-radius:var(--radius); margin-bottom:16px; border:1px solid var(--border); padding:20px 24px; }
  .deduct-card .deduct-title { font-size:14px; font-weight:600; color:var(--red); margin-bottom:4px; }
  .deduct-card .deduct-desc { font-size:11px; color:#999; margin-bottom:12px; }
  .feedback-card { background:var(--card); border-radius:var(--radius); margin-bottom:16px; border:1px solid var(--border); padding:20px 24px; }
  .feedback-card .feedback-title { font-size:14px; font-weight:600; color:var(--navy); margin-bottom:12px; }
  .feedback-row { margin-bottom:10px; }
  .feedback-row label { display:block; font-size:12px; font-weight:600; margin-bottom:4px; color:#555; }
  .feedback-row textarea { width:100%; border:1px solid #E0E0E0; border-radius:6px; padding:8px 10px; font-size:12px; line-height:1.5; resize:vertical; font-family:inherit; }
  .feedback-row textarea:focus { outline:none; border-color:var(--navy); }
  .bottomline-check { margin-top:12px; display:flex; flex-wrap:wrap; gap:6px; }
  .bottomline-item { display:flex; align-items:center; gap:4px; font-size:11px; padding:5px 10px; border-radius:6px; background:#F5F5F5; cursor:pointer; user-select:none; }
  .bottomline-item:hover { background:#EEE; }
  .bottomline-item.checked { background:#FFEBEE; color:var(--red); font-weight:600; }
  .bottomline-item input { display:none; }

  .result-section { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; margin-top:8px; }
  .result-header { background:linear-gradient(135deg,var(--navy),#2a5090); color:var(--white); padding:18px 24px; display:flex; align-items:center; justify-content:space-between; }
  .result-header h2 { font-size:16px; font-weight:700; }
  .result-body { padding:20px 24px; }
  .result-score-big { text-align:center; padding:16px 0; }
  .result-score-big .score-val { font-size:56px; font-weight:800; line-height:1; }
  .result-score-big .score-label { font-size:13px; color:#999; margin-top:4px; }
  .result-grade-badge { display:inline-block; font-size:16px; font-weight:700; padding:6px 24px; border-radius:30px; margin-top:8px; }
  .grade-a { background:#E8F5E9; color:var(--green); }
  .grade-b { background:#E3F2FD; color:var(--med-blue); }
  .grade-c { background:#FFF8E1; color:var(--gold); }
  .grade-d { background:#FFEBEE; color:var(--red); }
  .result-details { margin-top:16px; }
  .result-bar-row { display:flex; align-items:center; margin-bottom:8px; gap:10px; }
  .result-bar-label { width:110px; font-size:11px; font-weight:600; color:var(--navy); text-align:right; flex-shrink:0; }
  .result-bar-track-wrap { flex:1; display:flex; align-items:center; gap:6px; }
  .result-bar-tag { font-size:10px; font-weight:700; white-space:nowrap; flex-shrink:0; }
  .result-bar-track { flex:1; height:22px; background:#F0F2F5; border-radius:11px; overflow:hidden; }
  .result-bar-fill { height:100%; border-radius:11px; transition:width 0.4s; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; font-size:10px; font-weight:700; color:var(--white); min-width:28px; }
  .result-bar-score { font-size:12px; font-weight:700; width:44px; text-align:center; flex-shrink:0; }
  .anchor-warning { display:flex; align-items:flex-start; gap:8px; background:#FFEBEE; border:1px solid #EF9A9A; border-radius:8px; padding:10px 14px; margin-top:12px; font-size:12px; color:var(--red); }
  .action-box { margin-top:16px; padding:14px 18px; border-radius:8px; font-size:12px; line-height:1.6; }
  .action-box h3 { font-size:13px; margin-bottom:4px; }
  .action-a { background:#E8F5E9; border:1px solid #A5D6A7; color:#1B5E20; }
  .action-b { background:#E3F2FD; border:1px solid #90CAF9; color:#0D47A1; }
  .action-c { background:#FFF8E1; border:1px solid #FFE082; color:#E65100; }
  .action-d { background:#FFEBEE; border:1px solid #EF9A9A; color:#B71C1C; }

  .saved-section { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; margin-top:24px; }
  .saved-header { background:linear-gradient(135deg,var(--navy),#2a5090); color:var(--white); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
  .saved-header h2 { font-size:15px; font-weight:700; }
  .saved-header .count { font-size:12px; opacity:0.8; background:rgba(255,255,255,0.15); padding:2px 10px; border-radius:20px; }
  .saved-body { padding:20px 24px; }
  .compare-table-wrap { overflow-x:auto; }
  .compare-table { width:100%; border-collapse:collapse; font-size:12px; }
  .compare-table th { background:var(--navy); color:var(--white); padding:8px 10px; font-weight:600; white-space:nowrap; text-align:center; border-right:2px solid rgba(255,255,255,0.2); }
  .compare-table th:first-child { border-right:none; }
  .compare-table td { padding:8px 10px; border-bottom:1px solid var(--border); border-right:1px dashed #D0D5DD; text-align:center; vertical-align:middle; }
  .compare-table td:first-child { border-right:2px solid var(--navy); }
  .compare-table tr:nth-child(even) td { background:#F8F9FB; }
  .compare-table tr:hover td { background:var(--light-bg); }
  .compare-table .dim-row td:first-child { text-align:left; font-weight:600; color:var(--navy); white-space:nowrap; }
  .compare-table .grade-row td { font-weight:700; font-size:13px; }
  .compare-table .total-row td { font-weight:800; font-size:15px; border-top:2px solid var(--navy); background:#F0F2F5; }
  .supplier-chip { display:inline-flex; align-items:center; gap:6px; background:var(--light-bg); padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; color:var(--navy); margin:3px; }
  .supplier-chip .chip-del { width:16px; height:16px; border-radius:50%; background:var(--red); color:var(--white); display:flex; align-items:center; justify-content:center; font-size:10px; cursor:pointer; }
  .supplier-chip .chip-del:hover { opacity:0.7; }
  .empty-state { text-align:center; padding:30px 20px; color:#999; font-size:13px; }
  .rank-badge { display:inline-block; width:20px; height:20px; line-height:20px; border-radius:50%; font-size:11px; font-weight:800; text-align:center; margin-right:2px; }
  .rank-1 { background:#FFD700; color:#7B6100; }
  .rank-2 { background:#C0C0C0; color:#555; }
  .rank-3 { background:#CD7F32; color:#FFF; }
  .rank-other { background:#E0E0E0; color:#666; }
  .saved-toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }

  .tab-bar { display:flex; gap:0; margin-bottom:20px; }
  .tab-btn { padding:10px 24px; border:1.5px solid var(--border); background:var(--white); font-size:14px; font-weight:600; color:var(--body); cursor:pointer; transition:all 0.15s; }
  .tab-btn:first-child { border-radius:8px 0 0 8px; }
  .tab-btn:last-child { border-radius:0 8px 8px 0; }
  .tab-btn.active { background:var(--navy); color:var(--white); border-color:var(--navy); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .admin-prompt { text-align:center; padding:40px 20px; }
  .admin-prompt input { padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; width:200px; margin:0 8px; outline:none; }
  .admin-prompt input:focus { border-color:var(--med-blue); }

  @media (max-width:640px) {
    body { padding:10px; }
    .supplier-section { flex-direction:column; align-items:stretch; }
    .supplier-section input[type="text"] { width:100%; }
    .grade-ref { grid-template-columns:repeat(3,1fr); }
    .result-bar-label { width:80px; font-size:10px; }
    .result-bar-tag { font-size:9px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>福利定制供应商评价工具</h1>
    <p>输入各维度分数与锚点判定，自动计算等级并给出管理建议</p>
  </div>

  <!-- 评审人 + 供应商名 -->
  <div class="supplier-section">
    <label>你的名字</label>
    <input type="text" id="reviewer-name" placeholder="输入你的名字…" style="width:140px;" oninput="renderCompare()">
    <label>供应商名称</label>
    <input type="text" id="supplier-name" placeholder="输入供应商名称…">
  </div>

  <div id="dim-cards"></div>

  <div class="deduct-card">
    <div class="deduct-title">⚠️ 减分项（最高减10分）</div>
    <div class="deduct-desc">触及底线红线的情况</div>
    <div class="score-row">
      <label>减分</label>
      <div class="score-slider-wrap"><input type="range" class="score-slider" id="deduct-slider" min="0" max="10" value="0" step="1"></div>
      <input type="number" class="score-number" id="deduct-number" min="0" max="10" value="0" step="1">
      <span class="score-max">/ 10分</span>
    </div>
    <div class="bottomline-check" id="bottomline-checks"></div>
  </div>

  <div class="feedback-card">
    <div class="feedback-title">✍️ 补充评价</div>
    <div class="feedback-row">
      <label>👍 优点</label>
      <textarea id="pros-input" placeholder="该供应商的优势和亮点…" rows="2"></textarea>
    </div>
    <div class="feedback-row">
      <label>👎 不足</label>
      <textarea id="cons-input" placeholder="该供应商的问题和改进建议…" rows="2"></textarea>
    </div>
  </div>

  <div class="result-section">
    <div class="result-header">
      <h2>评价结果</h2>
      <span id="supplier-label" style="font-size:13px;opacity:0.7;"></span>
    </div>
    <div class="result-body">
      <div class="result-score-big">
        <div class="score-val" id="result-total" style="color:var(--navy);">0</div>
        <div class="score-label">总分（五维度合计 - 减分）</div>
        <div class="result-grade-badge grade-b" id="result-badge">B · 合格</div>
      </div>
      <div id="anchor-warnings"></div>
      <div class="result-details" id="result-bars"></div>
      <div id="result-action"></div>
      <div style="display:flex;gap:10px;margin-top:16px;justify-content:center;">
        <button class="btn btn-success" onclick="saveCurrent()" style="padding:10px 32px;font-size:14px;">💾 保存评价</button>
        <button class="btn btn-outline" onclick="resetAll()" style="padding:10px 24px;font-size:14px;">🔄 重置</button>
      </div>
    </div>
  </div>

  <!-- Tab 切换 -->
  <div class="tab-bar" style="margin-top:24px;">
    <button class="tab-btn active" onclick="switchTab('compare')">📊 全部对比</button>
    <button class="tab-btn" onclick="switchTab('admin')">👑 管理员</button>
  </div>

  <div class="tab-content active" id="tab-compare">
    <div class="saved-section">
      <div class="saved-header">
        <h2>📊 供应商评价对比</h2>
        <span class="count" id="saved-count">0 条</span>
      </div>
      <div class="saved-body">
        <div class="saved-toolbar" id="saved-toolbar" style="display:none;">
          <button class="btn btn-export btn-sm" onclick="exportTable()">📋 复制对比表格</button>
        </div>
        <div id="compare-area"></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-admin">
    <div class="saved-section">
      <div class="saved-header">
        <h2>👑 管理员视图</h2>
      </div>
      <div class="saved-body" id="admin-body">
        <div class="admin-prompt" id="admin-prompt">
          <p style="margin-bottom:12px;color:#999;">请输入管理员密码</p>
          <input type="password" id="admin-password" placeholder="管理员密码">
          <button class="btn btn-primary" onclick="checkAdmin()">确认</button>
        </div>
        <div id="admin-area" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<script>

function buildBottomlines() {
  const c = document.getElementById('bottomline-checks');
  BOTTOMLINES.forEach((bl, i) => {
    const div = document.createElement('div');
    div.className = 'bottomline-item';
    div.innerHTML = `<input type="checkbox" id="bl-${i}"><label for="bl-${i}">⚠️ ${bl}</label>`;
    div.onclick = (e) => { const cb=div.querySelector('input'); if(e.target.tagName!=='INPUT') cb.checked=!cb.checked; div.classList.toggle('checked',cb.checked); recalcDeduct(); };

// ═══════════════ 交互 ═══════════════
function toggleCard(id) { document.getElementById(`card-${id}`).classList.toggle('open'); }

function setAnchor(id, pass) {
  state[id].anchorPass = pass;
  document.getElementById(`anchor-pass-${id}`).className = 'anchor-btn'+(pass?' pass':'');
  document.getElementById(`anchor-fail-${id}`).className = 'anchor-btn'+(!pass?' fail-btn':'');
  document.getElementById(`anchor-box-${id}`).className = 'anchor-box'+(!pass?' fail':'');
  const card = document.getElementById(`card-${id}`);
  const isOpen = card.classList.contains('open');
  card.className = 'dim-card'+(isOpen?' open':'')+(!pass?' anchor-fail':'');
  if (!pass) { setScore(id,0); document.getElementById(`slider-${id}`).disabled=true; document.getElementById(`number-${id}`).disabled=true; }
  else { document.getElementById(`slider-${id}`).disabled=false; document.getElementById(`number-${id}`).disabled=false; }
  recalc();
}

function setScore(id, val) {
  val = Math.max(0, Math.min(DIMS.find(d=>d.id===id).weight, parseInt(val)||0));
  state[id].score = val;
  document.getElementById(`slider-${id}`).value=val;
  document.getElementById(`number-${id}`).value=val;
  document.getElementById(`display-${id}`).textContent=val;
  highlightGrade(id,val);
  recalc();
}
function setScoreFromNumber(id,val) { setScore(id,val); }

function highlightGrade(id, score) {
  const dim = DIMS.find(d=>d.id===id);
  dim.ranges.forEach(r => { document.getElementById(`ref-${id}-${r.name}`).classList.toggle('active', score>=r.min && score<=r.max); });
  const gradeEl = document.getElementById(`grade-${id}`);
  const hit = dim.ranges.find(r => score>=r.min && score<=r.max);
  if (hit && state[id].anchorPass!==false) {
    gradeEl.style.display='inline-block'; gradeEl.textContent=hit.name;
    const colors={'卓越':'var(--green)','优秀':'var(--med-blue)','良好':'var(--gold)','合格':'#E65100','不合格':'var(--red)'};
    const bgs={'卓越':'#E8F5E9','优秀':'#E3F2FD','良好':'#FFF8E1','合格':'#FFF3E0','不合格':'#FFEBEE'};
    gradeEl.style.color=colors[hit.name]; gradeEl.style.background=bgs[hit.name];
  } else if (state[id].anchorPass===false) {
    gradeEl.style.display='inline-block'; gradeEl.textContent='不合格（锚点）';
    gradeEl.style.color='var(--red)'; gradeEl.style.background='#FFEBEE';
  } else { gradeEl.style.display='none'; }
}

function recalcDeduct() {
  let count=0; document.querySelectorAll('.bottomline-item input').forEach(cb=>{if(cb.checked)count++;});
  deduct = Math.min(10, count*2);
  document.getElementById('deduct-slider').value=deduct;
  document.getElementById('deduct-number').value=deduct;
  recalc();
}

// ═══════════════ 计算引擎 ═══════════════
function calcResult(scores, deductVal) {
  let rawTotal=0; const anchorFails=[]; const details=[];
  DIMS.forEach(dim => {
    const s = scores[dim.id]; let eff = s.score;
    if (s.anchorPass===false) eff=0;
    rawTotal += eff;
    const hit = dim.ranges.find(r => eff>=r.min && eff<=r.max);
    details.push({ name:dim.name, score:eff, max:dim.weight, gradeName: s.anchorPass===false?'不合格':(hit?hit.name:'-'), pct:Math.round(eff/dim.weight*100) });
    if (s.anchorPass===false) anchorFails.push(dim);
  });
  const finalScore = Math.max(0, rawTotal-(deductVal||0));
  let gradeKey;
  if (anchorFails.length>=2) gradeKey='D';
  else if (finalScore>=85) gradeKey = anchorFails.length===1?'C':'A';
  else if (finalScore>=70) gradeKey = anchorFails.length===1?'C':'B';
  else if (finalScore>=55) gradeKey='C';
  else gradeKey='D';
  return { finalScore, gradeKey, details, anchorFails };
}

function recalc() {
  const { finalScore, gradeKey, details, anchorFails } = calcResult(state, deduct);
  const grade = GRADE_CONFIG[gradeKey];
  const totalEl = document.getElementById('result-total');
  totalEl.textContent = finalScore;
  const scoreColors={'A':'var(--green)','B':'var(--med-blue)','C':'var(--gold)','D':'var(--red)'};
  totalEl.style.color = scoreColors[gradeKey];
  const badge = document.getElementById('result-badge');
  badge.textContent=grade.name; badge.className='result-grade-badge '+grade.cls;
  document.getElementById('supplier-label').textContent = document.getElementById('supplier-name').value.trim()||'';

  const warnEl = document.getElementById('anchor-warnings');
  if (anchorFails.length>0) {
    warnEl.innerHTML = `<div class="anchor-warning"><span>⚠️</span><div><strong>关键锚点不达标：</strong>${anchorFails.map(d=>d.name+'（'+d.anchor+'）').join('、')}<br>锚点不达标的维度直接按0分计算。${anchorFails.length>=2?' 多个锚点不达标，等级直接判为D级。':' 有锚点不达标，等级上限为C级。'}</div></div>`;
  } else { warnEl.innerHTML=''; }

  const barColors={'卓越':'linear-gradient(90deg,#43A047,#66BB6A)','优秀':'linear-gradient(90deg,#1E88E5,#42A5F5)','良好':'linear-gradient(90deg,#F9A825,#FDD835)','合格':'linear-gradient(90deg,#E65100,#FF8F00)','不合格':'linear-gradient(90deg,#C62828,#EF5350)'};
  const stc={'卓越':'var(--green)','优秀':'var(--med-blue)','良好':'var(--gold)','合格':'#E65100','不合格':'var(--red)'};
  document.getElementById('result-bars').innerHTML = details.map(b=>{
    const narrow = b.pct < 15;
    const fillText = narrow ? '' : b.gradeName;
    const tag = narrow ? `<span class="result-bar-tag" style="color:${stc[b.gradeName]||'#999'}">${b.gradeName}</span>` : '';
    return `<div class="result-bar-row">
      <div class="result-bar-label">${b.name}</div>
      <div class="result-bar-track-wrap">${tag}<div class="result-bar-track"><div class="result-bar-fill" style="width:${b.pct}%;background:${barColors[b.gradeName]||barColors['不合格']}">${fillText}</div></div></div>
      <div class="result-bar-score" style="color:${stc[b.gradeName]||'#999'}">${b.score}/${b.max}</div>
    </div>`;
  }).join('')+(deduct>0?`
    <div class="result-bar-row">
      <div class="result-bar-label" style="color:var(--red);">减分项</div>
      <div class="result-bar-track-wrap"><div class="result-bar-track"><div class="result-bar-fill" style="width:${deduct*10}%;background:linear-gradient(90deg,#C62828,#EF5350)">-${deduct}</div></div></div>
      <div class="result-bar-score" style="color:var(--red);">-${deduct}</div>
    </div>` : '');

  document.getElementById('result-action').innerHTML = `<div class="action-box ${grade.actionCls}"><h3>📋 ${grade.name}（${grade.range}）—— 后续管理动作</h3><p>${grade.action}</p></div>`;
}

// ═══════════════ 保存 ═══════════════
async function saveCurrent() {
  const reviewer = document.getElementById('reviewer-name').value.trim();
  const supplier = document.getElementById('supplier-name').value.trim();
  if (!reviewer) { alert('请输入你的名字'); return; }
  if (!supplier) { alert('请输入供应商名称'); return; }
  const allAnchored = DIMS.every(d => state[d.id].anchorPass !== null);
  if (!allAnchored) { alert('请为所有维度判定锚点'); return; }

  const { finalScore, gradeKey } = calcResult(state, deduct);
  const pros = document.getElementById('pros-input').value.trim();
  const cons = document.getElementById('cons-input').value.trim();
  const row = {
    reviewer_name: reviewer, supplier_name: supplier,
    d1_score: state.d1.score, d1_anchor: state.d1.anchorPass,
    d2_score: state.d2.score, d2_anchor: state.d2.anchorPass,
    d3_score: state.d3.score, d3_anchor: state.d3.anchorPass,
    d4_score: state.d4.score, d4_anchor: state.d4.anchorPass,
    d5_score: state.d5.score, d5_anchor: state.d5.anchorPass,
    deduct, total: finalScore, grade: gradeKey,
    pros, cons,
  };

  if (sb) {
    const { error } = await sb.from('evaluations').upsert(row, { onConflict:'reviewer_name,supplier_name' });
    if (error) { alert('保存失败：' + error.message); return; }
  } else {
    // 本地模式
    let local = JSON.parse(localStorage.getItem('local_evals')||'[]');
    const idx = local.findIndex(e => e.reviewer_name===reviewer && e.supplier_name===supplier);
    if (idx>=0) local[idx] = row; else local.push(row);
    localStorage.setItem('local_evals', JSON.stringify(local));
  }

  alert(`✅ ${supplier} 评价已保存（${finalScore}分 · ${GRADE_CONFIG[gradeKey].name}）`);
  resetAll();
  await loadEvaluations();
}

async function deleteEval(id) {
  if (!confirm('确定删除？')) return;
  if (sb) { await sb.from('evaluations').delete().eq('id', id); }
  await loadEvaluations();
}

// ═══════════════ 对比渲染 ═══════════════
function renderCompare() {
  // 普通用户只看自己的数据
  const currentReviewer = document.getElementById('reviewer-name').value.trim();
  let evals = [...allEvaluations];
  try {
    const local = JSON.parse(localStorage.getItem('local_evals')||'[]');
    evals = [...evals, ...local];
  } catch(e){}

  // 按当前评审人过滤
  if (currentReviewer) {
    evals = evals.filter(e => e.reviewer_name === currentReviewer);
  }

  document.getElementById('saved-count').textContent = evals.length + ' 条';
  document.getElementById('saved-toolbar').style.display = evals.length>0?'flex':'none';

  if (!currentReviewer) {
    document.getElementById('compare-area').innerHTML='<div class="empty-state">请先输入你的名字，即可查看你的评价记录</div>';
    document.getElementById('saved-count').textContent = '0 条';
    document.getElementById('saved-toolbar').style.display = 'none';
    return;
  }

  if (!evals.length) {
    document.getElementById('compare-area').innerHTML='<div class="empty-state">你还没有保存过评价<br>在上方填写后点保存</div>';
    document.getElementById('saved-count').textContent = '0 条';
    document.getElementById('saved-toolbar').style.display = 'none';
    return;
  }

  const sorted = [...evals].sort((a,b) => b.total-a.total);
  let html = '<div class="compare-table-wrap"><table class="compare-table"><thead><tr><th style="text-align:left;">维度</th>';
  sorted.forEach((s,rank) => {
    const rc = rank===0?'rank-1':rank===1?'rank-2':rank===2?'rank-3':'rank-other';
    html += `<th><span class="rank-badge ${rc}">${rank+1}</span>${s.supplier_name}</th>`;
  });
  html += '</tr></thead><tbody>';

  ['d1','d2','d3','d4','d5'].forEach(did => {
    const dim = DIMS.find(d=>d.id===did);
    html += `<tr class="dim-row"><td>${dim.name}（${dim.weight}）</td>`;
    sorted.forEach(s => {
      const sc = s[did+'_score'], anch = s[did+'_anchor'], eff = anch===false?0:sc;
      const hit = dim.ranges.find(r=>eff>=r.min&&eff<=r.max);
      const gn = anch===false?'不合格':(hit?hit.name:'-');
      const cm = {'卓越':'var(--green)','优秀':'var(--med-blue)','良好':'var(--gold)','合格':'#E65100','不合格':'var(--red)'};
      html += `<td style="color:${cm[gn]||'#999'};font-weight:600;">${eff}<span style="font-weight:400;font-size:10px;opacity:.5;">/${dim.weight}</span><br><span style="font-size:10px;">${gn}</span></td>`;
    });
    html += '</tr>';
  });
  if (sorted.some(s=>s.deduct>0)) {
    html += '<tr class="dim-row"><td>减分项</td>';
    sorted.forEach(s => { html += `<td style="color:${s.deduct>0?'var(--red)':'#999'}">${s.deduct>0?'-'+s.deduct:'0'}</td>`; });
    html += '</tr>';
  }
  html += '<tr class="total-row"><td>总分</td>';
  sorted.forEach(s => { html += `<td class="${GRADE_CONFIG[s.grade]?.cls||'grade-d'}" style="font-size:16px;">${s.total}</td>`; });
  html += '</tr>';
  html += '<tr class="grade-row"><td>等级</td>';
  sorted.forEach(s => {
    const badge = `<span class="result-grade-badge ${GRADE_CONFIG[s.grade]?.cls||'grade-d'}" style="font-size:12px;padding:3px 14px;">${GRADE_CONFIG[s.grade]?.name||s.grade}</span>`;
    const prosHtml = s.pros ? `<div style="font-size:10px;color:#2E7D32;text-align:left;margin-top:4px;">👍 ${s.pros}</div>` : '';
    const consHtml = s.cons ? `<div style="font-size:10px;color:#C62828;text-align:left;margin-top:2px;">👎 ${s.cons}</div>` : '';
    html += `<td>${badge}${prosHtml}${consHtml}</td>`;
  });
  html += '</tr>';
  html += '<tr class="dim-row"><td>操作</td>';
  sorted.forEach(s => { html += `<td>${s.id ? `<button class="btn btn-danger" style="font-size:10px;padding:2px 8px;" onclick="deleteEval('${s.id}')">🗑 删除</button>` : ''}</td>`; });
  html += '</tr>';
  html += '</tbody></table></div>';
  document.getElementById('compare-area').innerHTML = html;
}

// ═══════════════ 管理员渲染 ═══════════════
function renderAdmin() {
  let evals = [...allEvaluations];
  try { const local = JSON.parse(localStorage.getItem('local_evals')||'[]'); evals = [...evals,...local]; } catch(e){}

  if (!evals.length) { document.getElementById('admin-area').innerHTML='<div class="empty-state">暂无数据</div>'; return; }

  const supplierMap = {};
  evals.forEach(e => { if (!supplierMap[e.supplier_name]) supplierMap[e.supplier_name]=[]; supplierMap[e.supplier_name].push(e); });

  const entries = Object.entries(supplierMap).sort((a,b) => {
    const avgA = a[1].reduce((s,e)=>s+e.total,0)/a[1].length;
    const avgB = b[1].reduce((s,e)=>s+e.total,0)/b[1].length;
    return avgB-avgA;
  });

  let html = '<div class="saved-toolbar"><button class="btn btn-export btn-sm" onclick="exportAdminTable()">📋 复制汇总表格</button></div>';
  entries.forEach(([name, evals2], idx) => {
    const avg = Math.round(evals2.reduce((s,e)=>s+e.total,0)/evals2.length);
    const rc = idx===0?'rank-1':idx===1?'rank-2':idx===2?'rank-3':'rank-other';
    const avgGrade = calcResult({d1:{score:Math.round(evals2.reduce((s,e)=>s+e.d1_score,0)/evals2.length),anchorPass:true},d2:{score:Math.round(evals2.reduce((s,e)=>s+e.d2_score,0)/evals2.length),anchorPass:true},d3:{score:Math.round(evals2.reduce((s,e)=>s+e.d3_score,0)/evals2.length),anchorPass:true},d4:{score:Math.round(evals2.reduce((s,e)=>s+e.d4_score,0)/evals2.length),anchorPass:true},d5:{score:Math.round(evals2.reduce((s,e)=>s+e.d5_score,0)/evals2.length),anchorPass:true}},0).gradeKey;
    html += `<div style="margin-bottom:16px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span class="rank-badge ${rc}">${idx+1}</span>
      <strong style="font-size:15px;color:var(--navy);">${name}</strong>
      <span class="result-grade-badge ${GRADE_CONFIG[avgGrade].cls}" style="font-size:12px;padding:2px 12px;">均分 ${avg} · ${GRADE_CONFIG[avgGrade].name}</span>
      <span style="font-size:12px;color:#999;">${evals2.length}人评价</span></div>
      <table class="compare-table"><thead><tr><th>评审人</th><th>设计(20)</th><th>选品(25)</th><th>品控(25)</th><th>交付(20)</th><th>服务(10)</th><th>减分</th><th>总分</th><th>等级</th><th>优点/不足</th><th></th></tr></thead><tbody>`;
    evals2.forEach(e => {
      html += `<tr><td style="font-weight:600;">${e.reviewer_name}</td>
        <td>${e.d1_anchor===false?'0⚠️':e.d1_score}</td><td>${e.d2_anchor===false?'0⚠️':e.d2_score}</td>
        <td>${e.d3_anchor===false?'0⚠️':e.d3_score}</td><td>${e.d4_anchor===false?'0⚠️':e.d4_score}</td>
        <td>${e.d5_anchor===false?'0⚠️':e.d5_score}</td>
        <td style="color:${e.deduct>0?'var(--red)':'#999'}">${e.deduct>0?'-'+e.deduct:'0'}</td>
        <td style="font-weight:700;font-size:14px;">${e.total}</td>
        <td><span class="result-grade-badge ${GRADE_CONFIG[e.grade]?.cls||'grade-d'}" style="font-size:11px;padding:2px 10px;">${GRADE_CONFIG[e.grade]?.name||e.grade}</span></td>
        <td style="font-size:11px;text-align:left;max-width:200px;">${e.pros?`<span style="color:#2E7D32;">👍${e.pros}</span>`:''}${e.cons?`<br><span style="color:#C62828;">👎${e.cons}</span>`:''}${!e.pros&&!e.cons?'—':''}</td>
        <td>${e.id ? `<button class="btn btn-danger" onclick="deleteEval('${e.id}')">删除</button>` : ''}</td></tr>`;
    });
    html += '</tbody></table></div>';
  });
  document.getElementById('admin-area').innerHTML = html;
}

// ═══════════════ 导出 ═══════════════
function exportTable() {
  const currentReviewer = document.getElementById('reviewer-name').value.trim();
  let evals = [...allEvaluations];
  try { const local = JSON.parse(localStorage.getItem('local_evals')||'[]'); evals = [...evals,...local]; } catch(e){}
  if (currentReviewer) evals = evals.filter(e => e.reviewer_name === currentReviewer);
  if (!evals.length) return;
  const sorted = [...evals].sort((a,b)=>b.total-a.total);
  let text = '福利定制供应商评价对比\n\n';
  text += ['评价维度',...sorted.map((s,i)=>`#${i+1} ${s.supplier_name}(${s.reviewer_name})`)].join('\t')+'\n';
  ['d1','d2','d3','d4','d5'].forEach(did => {
    const dim = DIMS.find(d=>d.id===did);
    const row = [`${dim.name}（${dim.weight}）`];
    sorted.forEach(s => { const eff=s[did+'_anchor']===false?0:s[did+'_score']; row.push(eff+'/'+dim.weight); });
    text += row.join('\t')+'\n';
  });
  text += ['总分',...sorted.map(s=>String(s.total))].join('\t')+'\n';
  text += ['等级',...sorted.map(s=>GRADE_CONFIG[s.grade]?.name||s.grade)].join('\t')+'\n';
  navigator.clipboard.writeText(text).then(()=>alert('✅ 已复制到剪贴板')).catch(()=>alert('复制失败'));
}

function exportAdminTable() {
  let evals = [...allEvaluations];
  try { const local = JSON.parse(localStorage.getItem('local_evals')||'[]'); evals = [...evals,...local]; } catch(e){}
  let text = '供应商评价汇总\n\n';
  text += ['供应商','评审人','设计','选品','品控','交付','服务','减分','总分','等级'].join('\t')+'\n';
  evals.forEach(e => { text += [e.supplier_name,e.reviewer_name,e.d1_score,e.d2_score,e.d3_score,e.d4_score,e.d5_score,e.deduct,e.total,GRADE_CONFIG[e.grade]?.name||e.grade].join('\t')+'\n'; });
  navigator.clipboard.writeText(text).then(()=>alert('✅ 已复制到剪贴板')).catch(()=>alert('复制失败'));
}

// ═══════════════ 重置 ═══════════════
function resetAll() {
  DIMS.forEach(dim => {
    state[dim.id] = { score:0, anchorPass:null };
    document.getElementById(`slider-${dim.id}`).value=0; document.getElementById(`slider-${dim.id}`).disabled=false;
    document.getElementById(`number-${dim.id}`).value=0; document.getElementById(`number-${dim.id}`).disabled=false;
    document.getElementById(`display-${dim.id}`).textContent='0';
    document.getElementById(`anchor-pass-${dim.id}`).className='anchor-btn';
    document.getElementById(`anchor-fail-${dim.id}`).className='anchor-btn';
    document.getElementById(`anchor-box-${dim.id}`).className='anchor-box';
    document.getElementById(`card-${dim.id}`).classList.remove('anchor-fail');
    highlightGrade(dim.id,0);
  });
  deduct=0;
  document.getElementById('deduct-slider').value=0; document.getElementById('deduct-number').value=0;
  document.querySelectorAll('.bottomline-item input').forEach(cb=>{cb.checked=false;});
  document.querySelectorAll('.bottomline-item').forEach(el=>el.classList.remove('checked'));
  document.getElementById('supplier-name').value='';
  document.getElementById('pros-input').value='';
  document.getElementById('cons-input').value='';
  recalc();
}

// ═══════════════ 减分滑块 ═══════════════
document.getElementById('deduct-slider').addEventListener('input', function() {
  deduct=parseInt(this.value); document.getElementById('deduct-number').value=deduct; recalc();
});
document.getElementById('deduct-number').addEventListener('input', function() {
  deduct=Math.max(0,Math.min(10,parseInt(this.value)||0)); document.getElementById('deduct-slider').value=deduct; recalc();
});

// ═══════════════ 初始化 ═══════════════
buildDimCards();
buildBottomlines();
toggleCard('d1');
recalc();

// 恢复上次输入的名字
const savedName = localStorage.getItem('reviewer_name') || '';
document.getElementById('reviewer-name').value = savedName;
document.getElementById('reviewer-name').addEventListener('input', function() {
  localStorage.setItem('reviewer_name', this.value);
});

initSupabase();
</script>
