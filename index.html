<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福利定制供应商评价工具</title>
<style>
  :root {
    --navy: #1F3864;
    --med-blue: #2E75B6;
    --light-bg: #D9E2F3;
    --body: #333333;
    --red: #C00000;
    --green: #0D723E;
    --gold: #BF8F00;
    --white: #FFFFFF;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --border: #E0E4EA;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "微软雅黑", sans-serif;
    background: var(--bg);
    color: var(--body);
    line-height: 1.6;
    padding: 20px;
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; }

  .header {
    text-align: center;
    padding: 32px 20px 24px;
    background: linear-gradient(135deg, var(--navy) 0%, #2a5090 100%);
    color: var(--white);
    border-radius: var(--radius);
    margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
  .header p { font-size: 13px; opacity: 0.8; }

  .supplier-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .supplier-section label { font-size: 14px; font-weight: 600; color: var(--navy); white-space: nowrap; }
  .supplier-section input[type="text"] {
    padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 14px; width: 200px; outline: none; transition: border-color 0.2s;
  }
  .supplier-section input[type="text"]:focus { border-color: var(--med-blue); }

  .btn {
    padding: 8px 20px; border: none; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--navy); color: var(--white); }
  .btn-success { background: var(--green); color: var(--white); }
  .btn-danger { background: var(--red); color: var(--white); padding: 5px 12px; font-size: 12px; }
  .btn-outline { background: var(--white); color: var(--navy); border: 1.5px solid var(--border); }
  .btn-outline:hover { border-color: var(--med-blue); color: var(--med-blue); }
  .btn-export { background: var(--med-blue); color: var(--white); }

  .dim-card {
    background: var(--card); border-radius: var(--radius); margin-bottom: 16px;
    border: 1px solid var(--border); overflow: hidden; transition: box-shadow 0.2s;
  }
  .dim-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
  .dim-card.anchor-fail { border-color: var(--red); border-width: 2px; }
  .dim-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; cursor: pointer; user-select: none;
  }
  .dim-header:hover { background: #f8f9fb; }
  .dim-header .dim-title { display: flex; align-items: center; gap: 12px; }
  .dim-header .dim-num {
    width: 32px; height: 32px; border-radius: 8px; background: var(--navy); color: var(--white);
    display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .dim-header .dim-name { font-size: 15px; font-weight: 600; color: var(--navy); }
  .dim-header .dim-weight {
    font-size: 12px; color: var(--med-blue); background: var(--light-bg);
    padding: 2px 10px; border-radius: 20px; font-weight: 600;
  }
  .dim-header .dim-result { display: flex; align-items: center; gap: 10px; }
  .dim-header .dim-grade { font-size: 12px; padding: 3px 12px; border-radius: 20px; font-weight: 600; display: none; }
  .dim-header .dim-score-display { font-size: 20px; font-weight: 700; color: var(--navy); min-width: 50px; text-align: right; }
  .dim-body { padding: 0 24px 20px; display: none; }
  .dim-card.open .dim-body { display: block; }
  .dim-card.open .dim-header { border-bottom: 1px solid var(--border); }

  .anchor-box { background: #FFF8E1; border: 1px solid #FFE082; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; }
  .anchor-box.fail { background: #FFEBEE; border-color: #EF9A9A; }
  .anchor-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .anchor-desc { font-size: 12px; color: #666; margin-bottom: 10px; line-height: 1.5; }
  .anchor-toggle { display: flex; gap: 8px; }
  .anchor-btn {
    padding: 6px 18px; border: 2px solid var(--border); border-radius: 20px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: var(--white); color: var(--body);
  }
  .anchor-btn:hover { opacity: 0.85; }
  .anchor-btn.pass { background: var(--green); color: var(--white); border-color: var(--green); }
  .anchor-btn.fail-btn { background: var(--red); color: var(--white); border-color: var(--red); }

  .score-row { display: flex; align-items: center; gap: 14px; }
  .score-row label { font-size: 13px; font-weight: 600; color: var(--navy); white-space: nowrap; }
  .score-slider-wrap { flex: 1; position: relative; }
  .score-slider {
    -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px;
    background: linear-gradient(to right, var(--red) 0%, var(--gold) 40%, var(--green) 80%);
    outline: none; cursor: pointer;
  }
  .score-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: var(--white); border: 3px solid var(--med-blue);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15); cursor: pointer;
  }
  .score-slider:disabled { opacity: 0.4; cursor: not-allowed; }
  .score-number {
    width: 64px; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 16px; font-weight: 700; text-align: center; color: var(--navy); outline: none;
  }
  .score-number:focus { border-color: var(--med-blue); }
  .score-number:disabled { opacity: 0.4; background: #f5f5f5; }
  .score-max { font-size: 13px; color: #999; }

  .grade-ref { margin-top: 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .grade-ref-item { text-align: center; padding: 6px 4px; border-radius: 6px; font-size: 11px; line-height: 1.4; transition: all 0.15s; }
  .grade-ref-item.active { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .grade-ref-item .g-name { font-weight: 700; }
  .grade-ref-item .g-range { color: #666; }
  .g-excellent { background: #E8F5E9; } .g-excellent .g-name { color: var(--green); } .g-excellent.active { background: #C8E6C9; }
  .g-good { background: #E3F2FD; } .g-good .g-name { color: var(--med-blue); } .g-good.active { background: #BBDEFB; }
  .g-ok { background: #FFF8E1; } .g-ok .g-name { color: var(--gold); } .g-ok.active { background: #FFECB3; }
  .g-pass { background: #FFF3E0; } .g-pass .g-name { color: #E65100; } .g-pass.active { background: #FFE0B2; }
  .g-fail { background: #FFEBEE; } .g-fail .g-name { color: var(--red); } .g-fail.active { background: #FFCDD2; }

  .deduct-card { background: var(--card); border-radius: var(--radius); margin-bottom: 16px; border: 1px solid var(--border); padding: 20px 24px; }
  .deduct-card .deduct-title { font-size: 15px; font-weight: 600; color: var(--red); margin-bottom: 4px; }
  .deduct-card .deduct-desc { font-size: 12px; color: #999; margin-bottom: 14px; }

  .result-section { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-top: 8px; }
  .result-header {
    background: linear-gradient(135deg, var(--navy), #2a5090);
    color: var(--white); padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .result-header h2 { font-size: 18px; font-weight: 700; }
  .result-body { padding: 24px 28px; }
  .result-score-big { text-align: center; padding: 20px 0; }
  .result-score-big .score-val { font-size: 64px; font-weight: 800; line-height: 1; }
  .result-score-big .score-label { font-size: 14px; color: #999; margin-top: 4px; }
  .result-grade-badge { display: inline-block; font-size: 18px; font-weight: 700; padding: 8px 28px; border-radius: 30px; margin-top: 10px; }
  .grade-a { background: #E8F5E9; color: var(--green); }
  .grade-b { background: #E3F2FD; color: var(--med-blue); }
  .grade-c { background: #FFF8E1; color: var(--gold); }
  .grade-d { background: #FFEBEE; color: var(--red); }

  .result-details { margin-top: 20px; }
  .result-bar-row { display: flex; align-items: center; margin-bottom: 10px; gap: 12px; }
  .result-bar-label { width: 120px; font-size: 12px; font-weight: 600; color: var(--navy); text-align: right; flex-shrink: 0; }
  .result-bar-track { flex: 1; height: 24px; background: #F0F2F5; border-radius: 12px; overflow: hidden; position: relative; }
  .result-bar-fill {
    height: 100%; border-radius: 12px; transition: width 0.4s ease;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 8px; font-size: 11px; font-weight: 700; color: var(--white); min-width: 32px;
  }
  .result-bar-score { font-size: 13px; font-weight: 700; width: 48px; text-align: center; flex-shrink: 0; }

  .anchor-warning {
    display: flex; align-items: flex-start; gap: 10px; background: #FFEBEE;
    border: 1px solid #EF9A9A; border-radius: 8px; padding: 12px 16px; margin-top: 14px; font-size: 13px; color: var(--red);
  }
  .anchor-warning .warn-icon { font-size: 18px; flex-shrink: 0; }

  .action-box { margin-top: 20px; padding: 16px 20px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
  .action-box h3 { font-size: 14px; margin-bottom: 6px; }
  .action-a { background: #E8F5E9; border: 1px solid #A5D6A7; color: #1B5E20; }
  .action-b { background: #E3F2FD; border: 1px solid #90CAF9; color: #0D47A1; }
  .action-c { background: #FFF8E1; border: 1px solid #FFE082; color: #E65100; }
  .action-d { background: #FFEBEE; border: 1px solid #EF9A9A; color: #B71C1C; }

  .bottomline-check { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
  .bottomline-item {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    padding: 6px 12px; border-radius: 6px; background: #F5F5F5;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .bottomline-item:hover { background: #EEEEEE; }
  .bottomline-item.checked { background: #FFEBEE; color: var(--red); font-weight: 600; }
  .bottomline-item input { display: none; }

  .reset-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 24px; background: var(--navy); color: var(--white);
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s; margin-top: 20px;
  }
  .reset-btn:hover { opacity: 0.85; }

  /* ═══════════════ 对比区域 ═══════════════ */
  .saved-section {
    background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
    overflow: hidden; margin-top: 28px;
  }
  .saved-header {
    background: linear-gradient(135deg, var(--navy), #2a5090);
    color: var(--white); padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .saved-header h2 { font-size: 16px; font-weight: 700; }
  .saved-header .count {
    font-size: 13px; opacity: 0.8; background: rgba(255,255,255,0.15);
    padding: 3px 12px; border-radius: 20px;
  }
  .saved-body { padding: 20px 24px; }

  .compare-table-wrap { overflow-x: auto; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .compare-table th {
    background: var(--navy); color: var(--white); padding: 10px 12px;
    font-weight: 600; white-space: nowrap; text-align: center;
  }
  .compare-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    text-align: center; vertical-align: middle;
  }
  .compare-table tr:nth-child(even) td { background: #F8F9FB; }
  .compare-table tr:hover td { background: var(--light-bg); }
  .compare-table .dim-row td:first-child { text-align: left; font-weight: 600; color: var(--navy); white-space: nowrap; }
  .compare-table .grade-row td { font-weight: 700; font-size: 14px; }
  .compare-table .total-row td {
    font-weight: 800; font-size: 16px; border-top: 2px solid var(--navy); background: #F0F2F5;
  }
  .compare-table .total-row td:first-child { background: #F0F2F5; }
  .compare-table .action-row td { font-size: 12px; text-align: left; line-height: 1.5; }

  .supplier-chip {
    display: inline-flex; align-items: center; gap: 6px; background: var(--light-bg);
    padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--navy);
    margin: 4px;
  }
  .supplier-chip .chip-del {
    width: 18px; height: 18px; border-radius: 50%; background: var(--red); color: var(--white);
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    cursor: pointer; line-height: 1;
  }
  .supplier-chip .chip-del:hover { opacity: 0.7; }

  .empty-state { text-align: center; padding: 40px 20px; color: #999; font-size: 14px; }

  .rank-badge {
    display: inline-block; width: 22px; height: 22px; line-height: 22px;
    border-radius: 50%; font-size: 12px; font-weight: 800; text-align: center; margin-right: 2px;
  }
  .rank-1 { background: #FFD700; color: #7B6100; }
  .rank-2 { background: #C0C0C0; color: #555; }
  .rank-3 { background: #CD7F32; color: #FFF; }
  .rank-other { background: #E0E0E0; color: #666; }

  .saved-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }

  @media (max-width: 640px) {
    body { padding: 12px; }
    .dim-header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .dim-body { padding: 0 16px 16px; }
    .grade-ref { grid-template-columns: repeat(3, 1fr); }
    .result-header { padding: 16px 20px; }
    .result-body { padding: 16px 20px; }
    .result-bar-label { width: 80px; font-size: 11px; }
    .supplier-section { flex-direction: column; align-items: stretch; }
    .supplier-section input[type="text"] { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>福利定制供应商评价工具</h1>
    <p>输入各维度分数与锚点判定，自动计算等级并给出管理建议</p>
  </div>

  <div class="supplier-section">
    <label for="supplier-name">供应商名称</label>
    <input type="text" id="supplier-name" placeholder="输入供应商名称…" />
    <button class="btn btn-success" onclick="saveCurrent()">💾 保存当前供应商</button>
    <button class="btn btn-outline" onclick="resetAll()">🔄 重置输入</button>
  </div>

  <div id="dim-cards"></div>

  <div class="deduct-card">
    <div class="deduct-title">⚠️ 减分项（最高减10分）</div>
    <div class="deduct-desc">触及底线红线的情况：重大安全事故、严重诚信问题、交付欺诈、品质严重缩水、严重延误无预警</div>
    <div class="score-row">
      <label>减分</label>
      <div class="score-slider-wrap">
        <input type="range" class="score-slider" id="deduct-slider" min="0" max="10" value="0" step="1">
      </div>
      <input type="number" class="score-number" id="deduct-number" min="0" max="10" value="0" step="1">
      <span class="score-max">/ 10分</span>
    </div>
    <div class="bottomline-check" id="bottomline-checks"></div>
  </div>

  <div class="result-section">
    <div class="result-header">
      <h2>评价结果</h2>
      <span id="supplier-label" style="font-size:14px;opacity:0.7;"></span>
    </div>
    <div class="result-body">
      <div class="result-score-big">
        <div class="score-val" id="result-total" style="color:var(--navy);">0</div>
        <div class="score-label">总分（五维度合计 - 减分）</div>
        <div class="result-grade-badge grade-b" id="result-badge">B · 合格</div>
      </div>
      <div id="anchor-warnings"></div>
      <div class="result-details" id="result-bars"></div>
      <div id="result-action"></div>
    </div>
  </div>

  <!-- 已保存对比区域 -->
  <div class="saved-section" id="saved-section">
    <div class="saved-header">
      <h2>📊 已保存供应商对比</h2>
      <span class="count" id="saved-count">0 家</span>
    </div>
    <div class="saved-body">
      <div id="saved-chips"></div>
      <div class="saved-toolbar" id="saved-toolbar" style="display:none;">
        <button class="btn btn-export" onclick="exportTable()">📋 复制对比表格</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑️ 清空全部</button>
      </div>
      <div id="compare-area"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════ 数据定义 ═══════════════
const DIMS = [
  {
    id: 'd1', num: '一', name: '设计与创意能力', weight: 20,
    anchor: '主题理解与设计创意能力',
    anchorDesc: '准确理解企业文化内涵，回应brief方向，且设计方案具备原创性与基本设计水准；主题理解严重偏离、设计方案敷衍/纯模板套用/缺乏基本设计品质，均视为锚点不达标',
    ranges: [
      { name: '卓越', min: 16, max: 20, cls: 'g-excellent' },
      { name: '优秀', min: 13, max: 15, cls: 'g-good' },
      { name: '良好', min: 10, max: 12, cls: 'g-ok' },
      { name: '合格', min: 7,  max: 9,  cls: 'g-pass' },
      { name: '不合格', min: 0, max: 6,  cls: 'g-fail' },
    ]
  },
  {
    id: 'd2', num: '二', name: '选品能力', weight: 25,
    anchor: '选品与主题契合度',
    anchorDesc: '选品与主题理解、设计理念高度契合，能准确回应项目需求',
    ranges: [
      { name: '卓越', min: 20, max: 25, cls: 'g-excellent' },
      { name: '优秀', min: 16, max: 19, cls: 'g-good' },
      { name: '良好', min: 12, max: 15, cls: 'g-ok' },
      { name: '合格', min: 8,  max: 11, cls: 'g-pass' },
      { name: '不合格', min: 0, max: 7,  cls: 'g-fail' },
    ]
  },
  {
    id: 'd3', num: '三', name: '品质把控能力', weight: 25,
    anchor: '主品品质稳定性',
    anchorDesc: '大货品质稳定可靠，实物与样品/效果图一致，无明显质量缺陷',
    ranges: [
      { name: '卓越', min: 20, max: 25, cls: 'g-excellent' },
      { name: '优秀', min: 16, max: 19, cls: 'g-good' },
      { name: '良好', min: 12, max: 15, cls: 'g-ok' },
      { name: '合格', min: 8,  max: 11, cls: 'g-pass' },
      { name: '不合格', min: 0, max: 7,  cls: 'g-fail' },
    ]
  },
  {
    id: 'd4', num: '四', name: '交付与履约能力', weight: 20,
    anchor: '按时按量按规格交付',
    anchorDesc: '在约定时间内完成约定数量的交付，货品规格、配送对象和地点无误，无重大延误、错发或缺货',
    ranges: [
      { name: '卓越', min: 16, max: 20, cls: 'g-excellent' },
      { name: '优秀', min: 13, max: 15, cls: 'g-good' },
      { name: '良好', min: 10, max: 12, cls: 'g-ok' },
      { name: '合格', min: 7,  max: 9,  cls: 'g-pass' },
      { name: '不合格', min: 0, max: 6,  cls: 'g-fail' },
    ]
  },
  {
    id: 'd5', num: '五', name: '服务与响应能力', weight: 10,
    anchor: '沟通配合度',
    anchorDesc: '对接顺畅，响应及时，能积极配合需求调整',
    ranges: [
      { name: '卓越', min: 8,  max: 10, cls: 'g-excellent' },
      { name: '优秀', min: 6,  max: 7,  cls: 'g-good' },
      { name: '良好', min: 5,  max: 5,  cls: 'g-ok' },
      { name: '合格', min: 3,  max: 4,  cls: 'g-pass' },
      { name: '不合格', min: 0, max: 2,  cls: 'g-fail' },
    ]
  },
];

const BOTTOMLINES = [
  '重大安全事故（产品安全隐患、消防/食品安全等）',
  '严重诚信问题（虚假报价、材质造假、抄袭方案等）',
  '严重交付欺诈（以次充好、偷工减料）',
  '大货品质严重缩水（与样品差异超可接受范围）',
  '交付严重延误（超7天）且无提前预警',
];

const GRADE_CONFIG = {
  'A': { name: 'A · 优选',  range: '85-100分', cls: 'grade-a', actionCls: 'action-a',
    action: '优先参与后续项目；可承接大型重点项目；可作为长期战略供应商培养。关注是否持续保持高水平，防止合作疲劳。' },
  'B': { name: 'B · 合格',  range: '70-84分',  cls: 'grade-b', actionCls: 'action-b',
    action: '可继续参与合作；关注薄弱环节改进；有大项目机会时可考虑。明确薄弱环节，跟进改进情况。' },
  'C': { name: 'C · 待观察', range: '55-69分',  cls: 'grade-c', actionCls: 'action-c',
    action: '谨慎合作，需在小项目中进一步验证；需额外关注履约过程。数据不足的：增加合作验证机会；存在问题的：要求供应商提交整改措施。' },
  'D': { name: 'D · 谨慎',  range: '55分以下', cls: 'grade-d', actionCls: 'action-d',
    action: '暂停合作；需供应商提交整改方案，经验证合格后方可重新参与。整改验证通过前不参与任何新项目。' },
};

// ═══════════════ 状态 ═══════════════
const state = {};
DIMS.forEach(d => { state[d.id] = { score: 0, anchorPass: null }; });
let deduct = 0;
let savedSuppliers = []; // [{name, scores:{d1:{score,anchorPass},...}, deduct, total, grade}]

// ═══════════════ localStorage 持久化 ═══════════════
const STORAGE_KEY = 'supplier_eval_saved';

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) savedSuppliers = JSON.parse(raw);
  } catch(e) { savedSuppliers = []; }
}

function persistSaved() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(savedSuppliers)); } catch(e) {}
}

// ═══════════════ 构建DOM ═══════════════
function buildDimCards() {
  const container = document.getElementById('dim-cards');
  container.innerHTML = '';
  DIMS.forEach(dim => {
    const card = document.createElement('div');
    card.className = 'dim-card';
    card.id = `card-${dim.id}`;
    card.innerHTML = `
      <div class="dim-header" onclick="toggleCard('${dim.id}')">
        <div class="dim-title">
          <div class="dim-num">${dim.num}</div>
          <div>
            <div class="dim-name">${dim.name}</div>
            <div class="dim-weight">满分 ${dim.weight} 分</div>
          </div>
        </div>
        <div class="dim-result">
          <div class="dim-grade" id="grade-${dim.id}"></div>
          <div class="dim-score-display" id="display-${dim.id}">0</div>
        </div>
      </div>
      <div class="dim-body">
        <div class="anchor-box" id="anchor-box-${dim.id}">
          <div class="anchor-title">🔒 关键锚点：${dim.anchor}</div>
          <div class="anchor-desc">${dim.anchorDesc}</div>
          <div class="anchor-toggle">
            <button class="anchor-btn" id="anchor-pass-${dim.id}" onclick="setAnchor('${dim.id}', true)">✅ 锚点达标</button>
            <button class="anchor-btn" id="anchor-fail-${dim.id}" onclick="setAnchor('${dim.id}', false)">❌ 锚点不达标</button>
          </div>
        </div>
        <div class="score-row">
          <label>维度评分</label>
          <div class="score-slider-wrap">
            <input type="range" class="score-slider" id="slider-${dim.id}" min="0" max="${dim.weight}" value="0" step="1" oninput="setScore('${dim.id}', this.value)">
          </div>
          <input type="number" class="score-number" id="number-${dim.id}" min="0" max="${dim.weight}" value="0" step="1" oninput="setScoreFromNumber('${dim.id}', this.value)">
          <span class="score-max">/ ${dim.weight}分</span>
        </div>
        <div class="grade-ref" id="ref-${dim.id}">
          ${dim.ranges.map(r => `
            <div class="grade-ref-item ${r.cls}" id="ref-${dim.id}-${r.name}">
              <div class="g-name">${r.name}</div>
              <div class="g-range">${r.min}-${r.max}分</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function buildBottomlines() {
  const container = document.getElementById('bottomline-checks');
  BOTTOMLINES.forEach((bl, i) => {
    const div = document.createElement('div');
    div.className = 'bottomline-item';
    div.innerHTML = `<input type="checkbox" id="bl-${i}"><label for="bl-${i}">⚠️ ${bl}</label>`;
    div.onclick = (e) => {
      const cb = div.querySelector('input');
      if (e.target.tagName !== 'INPUT') cb.checked = !cb.checked;
      div.classList.toggle('checked', cb.checked);
      recalcDeduct();
    };
    container.appendChild(div);
  });
}

// ═══════════════ 交互 ═══════════════
function toggleCard(id) {
  document.getElementById(`card-${id}`).classList.toggle('open');
}

function setAnchor(id, pass) {
  state[id].anchorPass = pass;
  const passBtn = document.getElementById(`anchor-pass-${id}`);
  const failBtn = document.getElementById(`anchor-fail-${id}`);
  const box = document.getElementById(`anchor-box-${id}`);
  const card = document.getElementById(`card-${id}`);
  passBtn.className = 'anchor-btn' + (pass ? ' pass' : '');
  failBtn.className = 'anchor-btn' + (!pass ? ' fail-btn' : '');
  box.className = 'anchor-box' + (!pass ? ' fail' : '');
  const isOpen = card.classList.contains('open');
  card.className = 'dim-card' + (isOpen ? ' open' : '') + (!pass ? ' anchor-fail' : '');
  if (!pass) {
    setScore(id, 0);
    document.getElementById(`slider-${id}`).disabled = true;
    document.getElementById(`number-${id}`).disabled = true;
  } else {
    document.getElementById(`slider-${id}`).disabled = false;
    document.getElementById(`number-${id}`).disabled = false;
  }
  recalc();
}

function setScore(id, val) {
  val = Math.max(0, Math.min(DIMS.find(d => d.id === id).weight, parseInt(val) || 0));
  state[id].score = val;
  document.getElementById(`slider-${id}`).value = val;
  document.getElementById(`number-${id}`).value = val;
  document.getElementById(`display-${id}`).textContent = val;
  highlightGrade(id, val);
  recalc();
}

function setScoreFromNumber(id, val) { setScore(id, val); }

function highlightGrade(id, score) {
  const dim = DIMS.find(d => d.id === id);
  dim.ranges.forEach(r => {
    document.getElementById(`ref-${id}-${r.name}`).classList.toggle('active', score >= r.min && score <= r.max);
  });
  const gradeEl = document.getElementById(`grade-${id}`);
  const hit = dim.ranges.find(r => score >= r.min && score <= r.max);
  if (hit && state[id].anchorPass !== false) {
    gradeEl.style.display = 'inline-block';
    gradeEl.textContent = hit.name;
    const colors = { '卓越': 'var(--green)', '优秀': 'var(--med-blue)', '良好': 'var(--gold)', '合格': '#E65100', '不合格': 'var(--red)' };
    const bgs = { '卓越': '#E8F5E9', '优秀': '#E3F2FD', '良好': '#FFF8E1', '合格': '#FFF3E0', '不合格': '#FFEBEE' };
    gradeEl.style.color = colors[hit.name]; gradeEl.style.background = bgs[hit.name];
  } else if (state[id].anchorPass === false) {
    gradeEl.style.display = 'inline-block';
    gradeEl.textContent = '不合格（锚点）';
    gradeEl.style.color = 'var(--red)'; gradeEl.style.background = '#FFEBEE';
  } else {
    gradeEl.style.display = 'none';
  }
}

function recalcDeduct() {
  let count = 0;
  document.querySelectorAll('.bottomline-item input').forEach(cb => { if (cb.checked) count++; });
  deduct = Math.min(10, count * 2);
  document.getElementById('deduct-slider').value = deduct;
  document.getElementById('deduct-number').value = deduct;
  recalc();
}

// ═══════════════ 计算引擎（共用） ═══════════════
function calcResult(scores, deductVal) {
  // scores: {d1:{score,anchorPass}, ...}
  let rawTotal = 0;
  let anchorFails = [];
  const details = [];

  DIMS.forEach(dim => {
    const s = scores[dim.id];
    let effectiveScore = s.score;
    if (s.anchorPass === false) effectiveScore = 0;
    rawTotal += effectiveScore;

    const hit = dim.ranges.find(r => effectiveScore >= r.min && effectiveScore <= r.max);
    details.push({
      name: dim.name, score: effectiveScore, max: dim.weight,
      gradeName: s.anchorPass === false ? '不合格' : (hit ? hit.name : '-'),
      pct: Math.round(effectiveScore / dim.weight * 100),
    });
    if (s.anchorPass === false) anchorFails.push(dim);
  });

  const finalScore = Math.max(0, rawTotal - (deductVal || 0));
  let gradeKey;
  if (anchorFails.length >= 2) gradeKey = 'D';
  else if (finalScore >= 85) gradeKey = anchorFails.length === 1 ? 'C' : 'A';
  else if (finalScore >= 70) gradeKey = anchorFails.length === 1 ? 'C' : 'B';
  else if (finalScore >= 55) gradeKey = 'C';
  else gradeKey = 'D';

  return { finalScore, gradeKey, details, anchorFails };
}

function gradeForScore(score) {
  if (score >= 85) return 'A';
  if (score >= 70) return 'B';
  if (score >= 55) return 'C';
  return 'D';
}

// ═══════════════ 当前结果渲染 ═══════════════
function recalc() {
  const { finalScore, gradeKey, details, anchorFails } = calcResult(state, deduct);
  const grade = GRADE_CONFIG[gradeKey];

  const totalEl = document.getElementById('result-total');
  totalEl.textContent = finalScore;
  const scoreColors = { 'A': 'var(--green)', 'B': 'var(--med-blue)', 'C': 'var(--gold)', 'D': 'var(--red)' };
  totalEl.style.color = scoreColors[gradeKey];

  const badge = document.getElementById('result-badge');
  badge.textContent = grade.name;
  badge.className = 'result-grade-badge ' + grade.cls;

  const name = document.getElementById('supplier-name').value.trim();
  document.getElementById('supplier-label').textContent = name || '';

  const warnEl = document.getElementById('anchor-warnings');
  if (anchorFails.length > 0) {
    warnEl.innerHTML = `<div class="anchor-warning">
      <span class="warn-icon">⚠️</span>
      <div><strong>关键锚点不达标：</strong>${anchorFails.map(d => d.name + '（' + d.anchor + '）').join('、')}
      <br>锚点不达标的维度直接按0分计算。${anchorFails.length >= 2 ? ' 多个锚点不达标，等级直接判为D级。' : ' 有锚点不达标，等级上限为C级。'}</div>
    </div>`;
  } else { warnEl.innerHTML = ''; }

  const barColors = {
    '卓越': 'linear-gradient(90deg, #43A047, #66BB6A)',
    '优秀': 'linear-gradient(90deg, #1E88E5, #42A5F5)',
    '良好': 'linear-gradient(90deg, #F9A825, #FDD835)',
    '合格': 'linear-gradient(90deg, #E65100, #FF8F00)',
    '不合格': 'linear-gradient(90deg, #C62828, #EF5350)',
  };
  const scoreTextColors = { '卓越': 'var(--green)', '优秀': 'var(--med-blue)', '良好': 'var(--gold)', '合格': '#E65100', '不合格': 'var(--red)' };

  document.getElementById('result-bars').innerHTML = details.map(b => `
    <div class="result-bar-row">
      <div class="result-bar-label">${b.name}</div>
      <div class="result-bar-track"><div class="result-bar-fill" style="width:${b.pct}%;background:${barColors[b.gradeName] || barColors['不合格']}">${b.gradeName}</div></div>
      <div class="result-bar-score" style="color:${scoreTextColors[b.gradeName] || '#999'}">${b.score}/${b.max}</div>
    </div>`).join('') + (deduct > 0 ? `
    <div class="result-bar-row">
      <div class="result-bar-label" style="color:var(--red);">减分项</div>
      <div class="result-bar-track"><div class="result-bar-fill" style="width:${deduct*10}%;background:linear-gradient(90deg,#C62828,#EF5350)">-${deduct}</div></div>
      <div class="result-bar-score" style="color:var(--red);">-${deduct}</div>
    </div>` : '');

  document.getElementById('result-action').innerHTML = `<div class="action-box ${grade.actionCls}">
    <h3>📋 ${grade.name}（${grade.range}）—— 后续管理动作</h3><p>${grade.action}</p></div>`;
}

// ═══════════════ 保存 & 对比 ═══════════════
function saveCurrent() {
  const name = document.getElementById('supplier-name').value.trim();
  if (!name) { alert('请先输入供应商名称'); return; }

  // 检查是否所有锚点都已判定
  const allAnchored = DIMS.every(d => state[d.id].anchorPass !== null);
  if (!allAnchored) { alert('请为所有维度判定锚点是否达标后再保存'); return; }

  // 检查重名
  const existIdx = savedSuppliers.findIndex(s => s.name === name);

  const scores = {};
  DIMS.forEach(d => { scores[d.id] = { score: state[d.id].score, anchorPass: state[d.id].anchorPass }; });

  const { finalScore, gradeKey } = calcResult(state, deduct);
  const record = { name, scores, deduct, total: finalScore, grade: gradeKey };

  if (existIdx >= 0) {
    savedSuppliers[existIdx] = record;
  } else {
    savedSuppliers.push(record);
  }

  persistSaved();
  renderCompare();
  resetAll(true); // 保存后清空，方便输入下一个
}

function deleteSaved(idx) {
  savedSuppliers.splice(idx, 1);
  persistSaved();
  renderCompare();
}

function clearAll() {
  if (!confirm('确定清空所有已保存的供应商评价？')) return;
  savedSuppliers = [];
  persistSaved();
  renderCompare();
}

function renderCompare() {
  // 更新计数
  document.getElementById('saved-count').textContent = savedSuppliers.length + ' 家';
  const toolbar = document.getElementById('saved-toolbar');
  toolbar.style.display = savedSuppliers.length > 0 ? 'flex' : 'none';

  // 供应商标签
  const chipsEl = document.getElementById('saved-chips');
  if (savedSuppliers.length === 0) {
    chipsEl.innerHTML = '';
    document.getElementById('compare-area').innerHTML = '<div class="empty-state">暂无已保存的供应商评价<br>在上方输入评分后点击「保存当前供应商」</div>';
    return;
  }

  chipsEl.innerHTML = savedSuppliers.map((s, i) => `
    <span class="supplier-chip">${s.name}（${s.total}分·${GRADE_CONFIG[s.grade].name}）
      <span class="chip-del" onclick="deleteSaved(${i})">✕</span>
    </span>
  `).join('');

  // 按总分排序（降序）
  const sorted = savedSuppliers.map((s, i) => ({ ...s, origIdx: i })).sort((a, b) => b.total - a.total);

  // 对比表格
  let html = '<div class="compare-table-wrap"><table class="compare-table"><thead><tr>';
  html += '<th style="text-align:left;min-width:120px;">评价维度</th>';
  sorted.forEach((s, rank) => {
    const rankCls = rank === 0 ? 'rank-1' : rank === 1 ? 'rank-2' : rank === 2 ? 'rank-3' : 'rank-other';
    html += `<th><span class="rank-badge ${rankCls}">${rank+1}</span> ${s.name}</th>`;
  });
  html += '</tr></thead><tbody>';

  // 每个维度一行
  DIMS.forEach(dim => {
    html += `<tr class="dim-row"><td>${dim.name}（${dim.weight}分）</td>`;
    sorted.forEach(s => {
      const sc = s.scores[dim.id];
      const eff = sc.anchorPass === false ? 0 : sc.score;
      const hit = dim.ranges.find(r => eff >= r.min && eff <= r.max);
      const gn = sc.anchorPass === false ? '不合格' : (hit ? hit.name : '-');
      const colorMap = { '卓越': 'var(--green)', '优秀': 'var(--med-blue)', '良好': 'var(--gold)', '合格': '#E65100', '不合格': 'var(--red)' };
      html += `<td style="color:${colorMap[gn] || '#999'};font-weight:600;">${eff}<span style="font-weight:400;font-size:11px;opacity:0.6;"> / ${dim.weight}</span><br><span style="font-size:11px;">${gn}</span>${sc.anchorPass === false ? '<br><span style="font-size:10px;color:var(--red);">⚠️ 锚点不达标</span>' : ''}</td>`;
    });
    html += '</tr>';
  });

  // 减分行
  const hasDeduct = sorted.some(s => s.deduct > 0);
  if (hasDeduct) {
    html += '<tr class="dim-row"><td>减分项</td>';
    sorted.forEach(s => {
      html += `<td style="color:${s.deduct > 0 ? 'var(--red)' : '#999'};font-weight:${s.deduct > 0 ? '600' : '400'};">${s.deduct > 0 ? '-' + s.deduct : '0'}</td>`;
    });
    html += '</tr>';
  }

  // 总分行
  html += '<tr class="total-row"><td>总分</td>';
  sorted.forEach(s => {
    const cls = GRADE_CONFIG[s.grade].cls;
    html += `<td class="${cls}" style="font-size:18px;">${s.total}</td>`;
  });
  html += '</tr>';

  // 等级行
  html += '<tr class="grade-row"><td>等级</td>';
  sorted.forEach(s => {
    const g = GRADE_CONFIG[s.grade];
    html += `<td><span class="result-grade-badge ${g.cls}" style="font-size:13px;padding:4px 16px;">${g.name}</span></td>`;
  });
  html += '</tr>';

  // 管理动作行
  html += '<tr class="action-row"><td style="font-weight:600;color:var(--navy);">后续管理动作</td>';
  sorted.forEach(s => {
    const g = GRADE_CONFIG[s.grade];
    html += `<td style="text-align:left;"><span class="${g.actionCls}" style="display:inline-block;padding:8px 12px;border-radius:6px;font-size:12px;">${g.action}</span></td>`;
  });
  html += '</tr>';

  html += '</tbody></table></div>';
  document.getElementById('compare-area').innerHTML = html;
}

// ═══════════════ 导出对比表格 ═══════════════
function exportTable() {
  if (savedSuppliers.length === 0) return;
  const sorted = savedSuppliers.map((s, i) => ({ ...s, origIdx: i })).sort((a, b) => b.total - a.total);

  let text = '福利定制供应商评价对比\n';
  text += '='.repeat(60) + '\n\n';

  // 表头
  const headers = ['评价维度', ...sorted.map((s, i) => `#${i+1} ${s.name}`)];
  text += headers.join('\t') + '\n';
  text += '-'.repeat(60) + '\n';

  DIMS.forEach(dim => {
    const row = [`${dim.name}（${dim.weight}分）`];
    sorted.forEach(s => {
      const sc = s.scores[dim.id];
      const eff = sc.anchorPass === false ? 0 : sc.score;
      const hit = dim.ranges.find(r => eff >= r.min && eff <= r.max);
      const gn = sc.anchorPass === false ? '不合格' : (hit ? hit.name : '-');
      row.push(`${eff}/${dim.weight} ${gn}${sc.anchorPass === false ? '（锚点不达标）' : ''}`);
    });
    text += row.join('\t') + '\n';
  });

  text += '-'.repeat(60) + '\n';
  text += ['总分', ...sorted.map(s => String(s.total))].join('\t') + '\n';
  text += ['等级', ...sorted.map(s => GRADE_CONFIG[s.grade].name)].join('\t') + '\n';
  text += ['后续管理动作', ...sorted.map(s => GRADE_CONFIG[s.grade].action)].join('\t') + '\n';

  navigator.clipboard.writeText(text).then(() => {
    alert('✅ 对比表格已复制到剪贴板！\n可直接粘贴到 Excel 或文档中。');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ 对比表格已复制到剪贴板！');
  });
}

// ═══════════════ 重置 ═══════════════
function resetAll(skipConfirm) {
  if (!skipConfirm) {
    // 不需要确认，直接重置输入区
  }
  DIMS.forEach(dim => {
    state[dim.id] = { score: 0, anchorPass: null };
    document.getElementById(`slider-${dim.id}`).value = 0;
    document.getElementById(`slider-${dim.id}`).disabled = false;
    document.getElementById(`number-${dim.id}`).value = 0;
    document.getElementById(`number-${dim.id}`).disabled = false;
    document.getElementById(`display-${dim.id}`).textContent = '0';
    document.getElementById(`anchor-pass-${dim.id}`).className = 'anchor-btn';
    document.getElementById(`anchor-fail-${dim.id}`).className = 'anchor-btn';
    document.getElementById(`anchor-box-${dim.id}`).className = 'anchor-box';
    const card = document.getElementById(`card-${dim.id}`);
    card.classList.remove('anchor-fail');
    highlightGrade(dim.id, 0);
  });
  deduct = 0;
  document.getElementById('deduct-slider').value = 0;
  document.getElementById('deduct-number').value = 0;
  document.querySelectorAll('.bottomline-item input').forEach(cb => { cb.checked = false; });
  document.querySelectorAll('.bottomline-item').forEach(el => el.classList.remove('checked'));
  document.getElementById('supplier-name').value = '';
  recalc();
}

// ═══════════════ 减分滑块同步 ═══════════════
document.getElementById('deduct-slider').addEventListener('input', function() {
  deduct = parseInt(this.value);
  document.getElementById('deduct-number').value = deduct;
  recalc();
});
document.getElementById('deduct-number').addEventListener('input', function() {
  deduct = Math.max(0, Math.min(10, parseInt(this.value) || 0));
  document.getElementById('deduct-slider').value = deduct;
  recalc();
});

// ═══════════════ 初始化 ═══════════════
buildDimCards();
buildBottomlines();
loadSaved();
renderCompare();
toggleCard('d1');
recalc();
</script>
